<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Status Cinema - Catálogo Dinâmico HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0a0d14;
            --bg-card: #111622;
            --accent-blue: #3b82f6;
            --accent-gold: #ffb800;
            --text-white: #ffffff;
            --text-muted: #94a3b8;
            --launch-purple: #8b5cf6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #05070a;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .controls {
            background: var(--bg-card);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 460px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .row-controls { display: flex; gap: 8px; }
        .row-controls select { flex: 1; }
        label { font-size: 13px; color: var(--text-muted); font-weight: 600; }
        textarea, input[type="text"] { padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background-color: var(--bg-main); color: var(--text-white); font-size: 14px; outline: none; font-family: inherit; }
        select, button { padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background-color: var(--bg-main); color: var(--text-white); font-size: 14px; outline: none; }
        .tabs-container { display: flex; gap: 5px; margin-top: 5px; background: var(--bg-main); padding: 4px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 8px 4px; font-size: 11px; font-weight: bold; border: none; border-radius: 8px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; text-align: center; }
        .tab-btn.active { background: var(--bg-card); color: #a78bfa; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .leque-grid { display: flex; gap: 10px; overflow-x: auto; padding: 8px 4px; margin-top: 5px; scroll-behavior: smooth; }
        .leque-grid::-webkit-scrollbar { height: 6px; }
        .leque-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .leque-item { flex: 0 0 85px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .leque-item:hover { transform: scale(1.05); }
        .leque-thumb { width: 85px; height: 125px; border-radius: 8px; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.4); margin-bottom: 4px; }
        .leque-thumb.season-mode { border: 1px dashed var(--launch-purple); }
        .leque-title { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .chips-holder { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .selected-chip { background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.4); color: #c084fc; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .selected-chip span { cursor: pointer; color: #ef4444; font-weight: bold; }
        .btn-gerar { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; padding: 14px; }
        .btn-tudo-em-um { background: linear-gradient(135deg, var(--launch-purple), #6d28d9); color: white; font-weight: bold; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .combo-launch-wrapper { width: 440px; background-color: var(--bg-main); border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .launch-header { background: linear-gradient(135deg, #161233, #0f172a); padding: 26px 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .launch-header h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(to right, #c084fc, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .launch-header p { margin: 5px 0 0 0; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; }
        .launch-separator { height: 1px; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%); margin: 5px 0; }
        .combo-container-duo { width: 440px; box-sizing: border-box; display: flex; padding: 20px 24px; gap: 16px; align-items: flex-start; position: relative; background-size: cover; background-position: center center; overflow: hidden; }
        .combo-container-duo::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(10, 13, 20, 0.92) 30%, rgba(10, 13, 20, 0.75) 70%, rgba(10, 13, 20, 0.95) 100%); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 1; }
        .duo-avatar { width: 100px; height: 148px; border-radius: 12px; background-size: cover; background-position: center; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.15); background-color: #1e293b; flex-shrink: 0; z-index: 2; position: relative; }
        .duo-content { display: flex; flex-direction: column; flex-grow: 1; z-index: 2; position: relative; }
        .slim-title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
        .slim-title { font-size: 18px; font-weight: 800; color: var(--text-white); line-height: 1.25; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .meta-tags { font-size: 11px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .slim-rating { background: rgba(255, 184, 0, 0.15); border: 1px solid rgba(255, 184, 0, 0.3); padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; color: var(--accent-gold); white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .slim-rating.upcoming { background: rgba(139, 92, 246, 0.2); border-color: rgba(139, 92, 246, 0.4); color: #a78bfa; }
        .synopsis-paragraph { color: #cbd5e1; font-size: 13px; line-height: 1.45; text-align: justify; margin: 0; overflow: visible; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .launch-footer { background-color: #0d111a; border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 18px; text-align: center; font-size: 11px; color: var(--text-muted); letter-spacing: 5px; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>1. Título do Topo da Imagem:</label>
            <select id="header-select" onchange="toggleCustomHeaderInput()">
                <option value="lançamentos">🚀 Grandes Lançamentos</option>
                <option value="indicações">🍿 Indicações da Semana</option>
                <option value="personalizado">✏️ Escrever Título Personalizado...</option>
            </select>
            <input type="text" id="custom-header-title" placeholder="Escreva seu título aqui..." style="display: none; margin-top: 6px;">
        </div>

        <div class="control-group" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
            <div class="row-controls">
                <label style="color: #60a5fa; flex-grow: 1;">🎬 Buscar Digitados (um por linha):</label>
                <select id="manual-type-select" style="padding: 4px 8px; font-size: 12px; border-radius: 6px;">
                    <option value="movie">🎬 Filme</option>
                    <option value="tv">📺 Série</option>
                </select>
            </div>
            <textarea id="search-input-released" rows="3" placeholder="Ex:&#10;Gladiador 2&#10;Breaking Bad" style="margin-top: 5px;"></textarea>
        </div>

        <div class="control-group" style="background: rgba(255,255,255,0.02); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <label style="color: #a78bfa;">🚀 Abra o Leque (Próximas Estreias e Temporadas):</label>
            <div class="tabs-container">
                <div class="tab-btn active" onclick="mudarAbaLeque('movies', this)">🎬 Filmes</div>
                <div class="tab-btn" onclick="mudarAbaLeque('series', this)">📺 Séries</div>
                <div class="tab-btn" onclick="mudarAbaLeque('seasons', this)">✨ Nova Temp.</div>
            </div>
            <div class="leque-grid" id="leque-items-holder"></div>
            <div class="chips-holder" id="selected-upcoming-chips"></div>
        </div>

        <button class="btn-gerar" onclick="gerarLoteNaTela()">Montar Lista Unificada</button>
        <button class="btn-tudo-em-um" onclick="exportarImagemUnica()">Gerar Imagem Única em HD</button>
    </div>

    <div class="combo-launch-wrapper" id="master-launch-block" style="display: none;">
        <div class="launch-header">
            <h1 id="header-title">Grandes Lançamentos</h1>
            <p id="header-subtitle">✦ Escolhas Especiais ✦</p>
        </div>
        <div id="inside-cards-holder"></div>
        <div class="launch-footer">🍿 Indicações Da Semana 🍿</div>
    </div>

    <script>
        const API_KEY = '407d99491b2f26dc699e5171de3ea84e'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const PROXY_URL = 'https://images.weserv.nl/?url=';
        const GENRES = { 28:'Ação', 12:'Aventura', 16:'Animação', 35:'Comédia', 80:'Crime', 99:'Documentário', 18:'Drama', 10751:'Família', 14:'Fantasia', 36:'História', 27:'Terror', 10402:'Música', 9648:'Mistério', 10749:'Romance', 878:'Ficção', 10770:'TV Movie', 53:'Thriller', 10752:'Guerra', 37:'Faroeste', 10759:'Ação/Avent', 10765:'Sci-Fi/Fant' };

        let proximosSelecionados = [];
        const hoje = new Date();

        window.onload = function() { carregarDadosDoTMDB('movies'); };

        function toggleCustomHeaderInput() {
            const select = document.getElementById('header-select').value;
            document.getElementById('custom-header-title').style.display = (select === 'personalizado') ? 'block' : 'none';
        }

        function mudarAbaLeque(tipo, elemento) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            elemento.classList.add('active');
            carregarDadosDoTMDB(tipo);
        }

        async function carregarDadosDoTMDB(tipo) {
            const grid = document.getElementById('leque-items-holder');
            grid.innerHTML = "<div style='font-size:11px; padding:10px; color:#94a3b8;'>Buscando...</div>";
            let url = '';
            const dataHoje = new Date().toISOString().split('T')[0];
            if (tipo === 'movies') url = `${BASE_URL}/movie/upcoming?api_key=${API_KEY}&language=pt-BR&page=1`;
            else if (tipo === 'series') url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&language=pt-BR&sort_by=popularity.desc&first_air_date.gte=${dataHoje}`;
            else if (tipo === 'seasons') url = `${BASE_URL}/tv/on_the_air?api_key=${API_KEY}&language=pt-BR&page=1`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                grid.innerHTML = '';
                if (data.results) {
                    data.results.forEach(item => {
                        const titulo = item.title || item.name;
                        const poster = item.poster_path ? `${PROXY_URL}image.tmdb.org/t/p/w500${item.poster_path}` : '';
                        grid.insertAdjacentHTML('beforeend', `<div class="leque-item" onclick="adicionarDoLeque('${titulo.replace(/'/g, "\\'")}', '${tipo === 'movies' ? 'movie' : 'tv'}', ${tipo === 'seasons'}, ${item.id})"><div class="leque-thumb ${tipo === 'seasons' ? 'season-mode' : ''}" style="background-image: url('${poster}')"></div><div class="leque-title">${titulo}</div></div>`);
                    });
                }
            } catch (e) { grid.innerHTML = "Erro."; }
        }

        function adicionarDoLeque(nome, tipo, isSeason, id) {
            if (proximosSelecionados.some(x => x.nome === nome)) return;
            proximosSelecionados.push({ nome: nome, tipo: tipo, isSeason: isSeason, id: id });
            renderizarChips();
        }

        function removerDoLeque(nome) { proximosSelecionados = proximosSelecionados.filter(x => x.nome !== nome); renderizarChips(); }

        function renderizarChips() {
            const container = document.getElementById('selected-upcoming-chips');
            container.innerHTML = '';
            proximosSelecionados.forEach(item => {
                container.insertAdjacentHTML('beforeend', `<div class="selected-chip">${item.nome}${item.isSeason ? ' (Nova Temp.)' : ''} <span onclick="removerDoLeque('${item.nome.replace(/'/g, "\\'")}')">×</span></div>`);
            });
        }

        async function gerarLoteNaTela() {
            const txtReleased = document.getElementById('search-input-released');
            const holder = document.getElementById('inside-cards-holder');
            const masterBlock = document.getElementById('master-launch-block');
            holder.innerHTML = '';
            masterBlock.style.display = "block";
            const linhas = txtReleased.value.split('\n').filter(l => l.length > 0);
            
            for (let l of linhas) {
                await buscarMidiaTMDB(l, document.getElementById('manual-type-select').value, holder);
            }
            for (let p of proximosSelecionados) {
                await buscarMidiaTMDB(p.nome, p.tipo, holder);
            }
        }

        async function buscarMidiaTMDB(query, type, elementoAlvo) {
            try {
                const response = await fetch(`${BASE_URL}/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    const m = data.results[0];
                    const dataLancamento = m.release_date || m.first_air_date || '';
                    const ano = dataLancamento.substring(0, 4);
                    const generos = m.genre_ids ? m.genre_ids.slice(0, 2).map(id => GENRES[id]).join(' • ') : '';
                    
                    const ehBreve = new Date(dataLancamento) > hoje;
                    let notaTexto = ehBreve ? 'EM BREVE' : '⭐ ' + (m.vote_average || 0).toFixed(1);

                    const backdropPath = `${PROXY_URL}image.tmdb.org/t/p/w780${m.backdrop_path}`;
                    const profilePath = `${PROXY_URL}image.tmdb.org/t/p/w500${m.poster_path}`;
                    
                    elementoAlvo.insertAdjacentHTML('beforeend', `
                        <div class="combo-container-duo" style="background-image: url('${backdropPath}')">
                            <div class="duo-avatar" style="background-image: url('${profilePath}')"></div>
                            <div class="duo-content">
                                <div class="slim-title-row">
                                    <div class="slim-title">${m.title || m.name}</div>
                                    <div class="slim-rating ${ehBreve ? 'upcoming' : ''}">${notaTexto}</div>
                                </div>
                                <div class="meta-tags">${ano} • ${generos}</div>
                                <p class="synopsis-paragraph">${m.overview || 'Sem sinopse.'}</p>
                            </div>
                        </div><div class="launch-separator"></div>`);
                }
            } catch (error) {}
        }

        function exportarImagemUnica() {
            const blocoMestre = document.getElementById('master-launch-block');
            html2canvas(blocoMestre, { scale: 4, useCORS: true, backgroundColor: "#0a0d14" }).then((canvas) => {
                const link = document.createElement('a');
                link.download = `catalogo-hd.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });
        }
    </script>
</body>
</html>
