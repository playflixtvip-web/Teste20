<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Status Cinema - Catálogo Dinâmico HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0a0d14;
            --bg-card: #111622;
            --accent-blue: #3b82f6;
            --accent-gold: #ffb800;
            --text-white: #ffffff;
            --text-muted: #94a3b8;
            --launch-purple: #8b5cf6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #05070a;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .controls {
            background: var(--bg-card);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 460px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .row-controls {
            display: flex;
            gap: 8px;
        }

        .row-controls select {
            flex: 1;
        }

        label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        textarea, input[type="text"] {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: var(--bg-main);
            color: var(--text-white);
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        select, button {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: var(--bg-main);
            color: var(--text-white);
            font-size: 14px;
            outline: none;
        }

        .tabs-container {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            background: var(--bg-main);
            padding: 4px;
            border-radius: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 4px;
            font-size: 11px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--bg-card);
            color: #a78bfa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .leque-grid {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 4px;
            margin-top: 5px;
            scroll-behavior: smooth;
        }

        .leque-grid::-webkit-scrollbar {
            height: 6px;
        }
        .leque-grid::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .leque-item {
            flex: 0 0 85px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .leque-item:hover {
            transform: scale(1.05);
        }

        .leque-thumb {
            width: 85px;
            height: 125px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            margin-bottom: 4px;
        }

        .leque-thumb.season-mode {
            border: 1px dashed var(--launch-purple);
        }

        .leque-title {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .chips-holder {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .selected-chip {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #c084fc;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .selected-chip span {
            cursor: pointer;
            color: #ef4444;
            font-weight: bold;
        }

        .btn-gerar {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            padding: 14px;
        }

        .btn-tudo-em-um {
            background: linear-gradient(135deg, var(--launch-purple), #6d28d9);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .combo-launch-wrapper {
            width: 440px;
            background-color: var(--bg-main);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .launch-header {
            background: linear-gradient(135deg, #161233, #0f172a);
            padding: 26px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .launch-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(to right, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .launch-header p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .launch-separator {
            height: 1px;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
            margin: 5px 0;
        }

        .combo-container-duo {
            width: 440px;
            box-sizing: border-box;
            display: flex;
            padding: 20px 24px;
            gap: 16px;
            align-items: flex-start;
            position: relative;
            background-size: cover;
            background-position: center center;
            overflow: hidden;
        }

        .combo-container-duo::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(10, 13, 20, 0.92) 30%, rgba(10, 13, 20, 0.75) 70%, rgba(10, 13, 20, 0.95) 100%);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1;
        }

        .duo-avatar {
            width: 100px;
            height: 148px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #1e293b;
            flex-shrink: 0;
            z-index: 2;
            position: relative;
        }

        .duo-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            z-index: 2;
            position: relative;
        }

        .slim-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 6px;
        }

        .slim-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-white);
            line-height: 1.25;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .slim-rating {
            background: rgba(255, 184, 0, 0.15);
            border: 1px solid rgba(255, 184, 0, 0.3);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-gold);
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .slim-rating.upcoming {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.4);
            color: #a78bfa;
        }

        .slim-rating.new-season {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        .metadata-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .tag-item {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 10px;
            color: #e2e8f0;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag-item.blue {
            background-color: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        .synopsis-paragraph {
            color: #cbd5e1;
            font-size: 13px;
            line-height: 1.45;
            text-align: justify;
            margin: 0;
            overflow: visible;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .launch-footer {
            background-color: #0d111a;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 5px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>1. Título do Topo da Imagem:</label>
            <select id="header-select" onchange="toggleCustomHeaderInput()">
                <option value="lançamentos">🚀 Grandes Lançamentos</option>
                <option value="indicações">🍿 Indicações da Semana</option>
                <option value="personalizado">✏️ Escrever Título Personalizado...</option>
            </select>
            <input type="text" id="custom-header-title" placeholder="Escreva seu título aqui..." style="display: none; margin-top: 6px;">
        </div>

        <div class="control-group" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
            <div class="row-controls">
                <label style="color: #60a5fa; flex-grow: 1;">🎬 Buscar Digitados (um por linha):</label>
                <select id="manual-type-select" style="padding: 4px 8px; font-size: 12px; border-radius: 6px;">
                    <option value="movie">🎬 Filme</option>
                    <option value="tv">📺 Série</option>
                </select>
            </div>
            <textarea id="search-input-released" rows="3" placeholder="Ex:&#10;Gladiador 2&#10;Breaking Bad" style="margin-top: 5px;"></textarea>
        </div>

        <div class="control-group" style="background: rgba(255,255,255,0.02); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <label style="color: #a78bfa;">🚀 Abra o Leque (Próximas Estreias e Temporadas):</label>
            
            <div class="tabs-container">
                <div class="tab-btn active" onclick="mudarAbaLeque('movies', this)">🎬 Filmes</div>
                <div class="tab-btn" onclick="mudarAbaLeque('series', this)">📺 Séries</div>
                <div class="tab-btn" onclick="mudarAbaLeque('seasons', this)">✨ Nova Temp.</div>
            </div>

            <div class="leque-grid" id="leque-items-holder"></div>

            <div class="chips-holder" id="selected-upcoming-chips"></div>
        </div>

        <button class="btn-gerar" onclick="gerarLoteNaTela()">Montar Lista Unificada</button>
        <button class="btn-tudo-em-um" onclick="exportarImagemUnica()">Gerar Imagem Única Completa</button>
    </div>

    <div class="combo-launch-wrapper" id="master-launch-block" style="display: none;">
        <div class="launch-header">
            <h1 id="header-title">Grandes Lançamentos</h1>
            <p id="header-subtitle">✦ Escolhas Especiais ✦</p>
        </div>
        <div id="inside-cards-holder"></div>
        <div class="launch-footer">🍿 Siga para mais dicas diárias 🍿</div>
    </div>

    <script>
        const API_KEY = '407d99491b2f26dc699e5171de3ea84e'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const PROXY_URL = 'https://images.weserv.nl/?url=';
        const TMDB_IMAGE_BASE = 'image.tmdb.org/t/p/w342';
        const TMDB_BACKDROP_BASE = 'image.tmdb.org/t/p/w780';

        const GENRES = {
            28:"Ação", 12:"Aventura", 16:"Animação", 35:"Comédia", 80:"Crime", 99:"Documentário", 18:"Drama", 10751:"Família",
            14:"Fantasia", 36:"História", 27:"Terror", 10402:"Música", 9648:"Mistério", 10749:"Romance", 878:"Ficção Científica",
            10770:"Cinema TV", 53:"Thriller", 10752:"Guerra", 37:"Faroeste", 10759:"Ação/Avent", 10765:"Sci-Fi/Fant"
        };

        let proximosSelecionados = [];

        window.onload = function() {
            carregarDadosDoTMDB('movies');
        };

        function toggleCustomHeaderInput() {
            const select = document.getElementById('header-select').value;
            document.getElementById('custom-header-title').style.display = (select === 'personalizado') ? 'block' : 'none';
        }

        function mudarAbaLeque(tipo, elemento) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            elemento.classList.add('active');
            carregarDadosDoTMDB(tipo);
        }

        async function carregarDadosDoTMDB(tipo) {
            const grid = document.getElementById('leque-items-holder');
            grid.innerHTML = "<div style='font-size:11px; padding:10px; color:#94a3b8;'>Buscando lançamentos...</div>";
            
            let url = '';
            const hoje = new Date().toISOString().split('T')[0];

            if (tipo === 'movies') {
                url = `${BASE_URL}/movie/upcoming?api_key=${API_KEY}&language=pt-BR&page=1`;
            } else if (tipo === 'series') {
                url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&language=pt-BR&sort_by=popularity.desc&first_air_date.gte=${hoje}`;
            } else if (tipo === 'seasons') {
                url = `${BASE_URL}/tv/on_the_air?api_key=${API_KEY}&language=pt-BR&page=1`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                grid.innerHTML = '';

                if (data.results && data.results.length > 0) {
                    // Removido o .slice(0, 12) para listar todos os resultados
                    data.results.forEach(item => {
                        const titulo = item.title || item.name;
                        const poster = item.poster_path ? `${PROXY_URL}${TMDB_IMAGE_BASE}${item.poster_path}` : 'https://via.placeholder.com/150x225?text=Sem+Foto';
                        const typeTag = (tipo === 'movies') ? 'movie' : 'tv';
                        const isSeason = (tipo === 'seasons') ? 'true' : 'false';

                        const htmlItem = `
                            <div class="leque-item" onclick="adicionarDoLeque('${titulo.replace(/'/g, "\\'")}', '${typeTag}', ${isSeason}, ${item.id})">
                                <div class="leque-thumb ${tipo === 'seasons' ? 'season-mode' : ''}" style="background-image: url('${poster}')"></div>
                                <div class="leque-title">${titulo}</div>
                            </div>
                        `;
                        grid.insertAdjacentHTML('beforeend', htmlItem);
                    });
                } else {
                    grid.innerHTML = "<div style='font-size:11px; color:red;'>Nenhum item encontrado.</div>";
                }
            } catch (e) {
                grid.innerHTML = "<div style='font-size:11px; color:red;'>Erro na API.</div>";
            }
        }

        function adicionarDoLeque(nome, tipo, isSeason, id) {
            if (proximosSelecionados.some(x => x.nome === nome)) return;
            proximosSelecionados.push({ nome: nome, tipo: tipo, isSeason: isSeason, id: id });
            renderizarChips();
        }

        function removerDoLeque(nome) {
            proximosSelecionados = proximosSelecionados.filter(x => x.nome !== nome);
            renderizarChips();
        }

        function renderizarChips() {
            const container = document.getElementById('selected-upcoming-chips');
            container.innerHTML = '';
            proximosSelecionados.forEach(item => {
                const sufixo = item.isSeason ? ' (Nova Temp.)' : '';
                container.insertAdjacentHTML('beforeend', `
                    <div class="selected-chip">
                        ${item.nome}${sufixo} <span onclick="removerDoLeque('${item.nome.replace(/'/g, "\\'")}')">×</span>
                    </div>
                `);
            });
        }

        async function gerarLoteNaTela() {
            const txtReleased = document.getElementById('search-input-released');
            const holder = document.getElementById('inside-cards-holder');
            const masterBlock = document.getElementById('master-launch-block');
            
            const headerStyle = document.getElementById('header-select').value;
            const manualType = document.getElementById('manual-type-select').value;
            const titleEl = document.getElementById('header-title');
            const subtitleEl = document.getElementById('header-subtitle');
            
            if (headerStyle === 'lançamentos') {
                titleEl.innerText = "Grandes Lançamentos";
                subtitleEl.innerText = "✦ Escolhas Especiais ✦";
            } else if (headerStyle === 'indicações') {
                titleEl.innerText = "Indicações da Semana";
                subtitleEl.innerText = "✦ As Melhores Dicas ✦";
            } else {
                const customTxt = document.getElementById('custom-header-title').value.trim();
                titleEl.innerText = customTxt ? customTxt : "Destaques Culturais";
                subtitleEl.innerText = "✦ Seleção Exclusiva ✦";
            }

            holder.innerHTML = ''; 
            const linhasReleased = txtReleased.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            if (linhasReleased.length === 0 && proximosSelecionados.length === 0) {
                return alert('Por favor, digite obras ou adicione itens do Leque.');
            }

            masterBlock.style.display = "block"; 
            let totalInserido = 0;

            for (let i = 0; i < linhasReleased.length; i++) {
                if (totalInserido > 0) holder.insertAdjacentHTML('beforeend', '<div class="launch-separator"></div>');
                await buscarMidiaTMDB(linhasReleased[i], manualType, holder, false, false, null);
                totalInserido++;
            }

            for (let i = 0; i < proximosSelecionados.length; i++) {
                if (totalInserido > 0) holder.insertAdjacentHTML('beforeend', '<div class="launch-separator"></div>');
                await buscarMidiaTMDB(proximosSelecionados[i].nome, proximosSelecionados[i].tipo, holder, true, proximosSelecionados[i].isSeason, proximosSelecionados[i].id);
                totalInserido++;
            }
        }

        async function buscarMidiaTMDB(query, type, elementoAlvo, forçarEmBreve, isSeason, idTMDB) {
            try {
                const response = await fetch(`${BASE_URL}/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    const midia = data.results[0];
                    const idAtual = idTMDB || midia.id;
                    const titulo = midia.title || midia.name;
                    const dataLancamento = midia.release_date || midia.first_air_date;
                    const ano = dataLancamento ? dataLancamento.split('-')[0] : 'N/A';
                    const sinopse = midia.overview || 'A sinopse detalhada desta obra está sendo preparada pelos nossos editores.';
                    
                    let badgeNota = `⭐ ${midia.vote_average ? midia.vote_average.toFixed(1) : '0.0'}`;
                    let classeBadge = '';

                    if (isSeason && type === 'tv') {
                        try {
                            const resDetail = await fetch(`${BASE_URL}/tv/${idAtual}?api_key=${API_KEY}&language=pt-BR`);
                            const detail = await resDetail.json();
                            const numTemp = detail.number_of_seasons || 1;
                            badgeNota = `✨ ${numTemp}ª TEMPORADA`;
                            classeBadge = 'new-season';
                        } catch (ed) {
                            badgeNota = `✨ NOVA TEMP.`;
                            classeBadge = 'new-season';
                        }
                    } else if (forçarEmBreve || !midia.vote_average || midia.vote_average === 0) {
                        badgeNota = `📅 EM BREVE`;
                        classeBadge = 'upcoming';
                    }
                    
                    let generosTexto = 'Cinema';
                    if (midia.genre_ids && midia.genre_ids.length > 0) {
                        generosTexto = midia.genre_ids.slice(0, 2).map(id => GENRES[id] || 'Cinema').join(' / ');
                    }

                    const imgPoster = midia.poster_path ? `${TMDB_IMAGE_BASE}${midia.poster_path}` : '';
                    const imgBackdrop = midia.backdrop_path ? `${TMDB_BACKDROP_BASE}${midia.backdrop_path}` : midia.poster_path;
                    
                    const profilePath = imgPoster ? `${PROXY_URL}image.tmdb.org/t/p/w500${midia.poster_path}` : 'https://via.placeholder.com/300x450?text=Poster';
                    const backdropPath = imgBackdrop ? `${PROXY_URL}image.tmdb.org/t/p/w780${midia.backdrop_path}` : profilePath;

                    const htmlFinal = `
                        <div class="combo-container-duo" style="background-image: url('${backdropPath}')">
                            <div class="duo-avatar" style="background-image: url('${profilePath}')"></div>
                            <div class="duo-content">
                                <div class="slim-title-row">
                                    <div class="slim-title">${titulo}</div>
                                    <div class="slim-rating ${classeBadge}">${badgeNota}</div>
                                </div>
                                <div class="metadata-tags-row">
                                    <div class="tag-item blue">${type === 'movie' ? 'Filme' : 'Série'}</div>
                                    <div class="tag-item">${ano}</div>
                                    <div class="tag-item">${generosTexto}</div>
                                </div>
                                <p class="synopsis-paragraph">${sinopse}</p>
                            </div>
                        </div>
                    `;

                    elementoAlvo.insertAdjacentHTML('beforeend', htmlFinal);
                }
            } catch (error) {
                console.error(error);
            }
        }

        function exportarImagemUnica() {
            const blocoMestre = document.getElementById('master-launch-block');
            if (blocoMestre.style.display === "none") return alert('Monte a lista na tela primeiro.');

            html2canvas(blocoMestre, {
                scale: 3, 
                dpi: 300,
                useCORS: true,
                backgroundColor: "#0a0d14"
            }).then((canvas) => {
                canvas.toBlob((blob) => {
                    if (!blob) return;
                    const arquivo = new File([blob], 'vitrine.png', { type: 'image/png' });
                    if (navigator.canShare && navigator.canShare({ files: [arquivo] })) {
                        navigator.share({ files: [arquivo] }).catch(e => {});
                    } else {
                        const link = document.createElement('a');
                        link.download = `cinema-status-hd.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    }
                }, 'image/png');
            });
        }
    </script>
</body>
</html>
