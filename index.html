<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Filmes - Lançamentos 2026</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        header h1 span {
            color: var(--accent-color);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .search-bar {
            margin-bottom: 2rem;
            text-align: center;
        }

        .search-bar input {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--accent-color);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
        }

        .poster-placeholder {
            width: 100%;
            height: 310px;
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            padding: 1rem;
            text-align: center;
            position: relative;
        }

        .poster-placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 0.5rem;
            fill: currentColor;
            opacity: 0.5;
        }

        /* Se tiver imagem real, use esta classe substituindo a div de placeholder */
        .movie-poster {
            width: 100%;
            height: 310px;
            object-fit: cover;
            display: block;
        }

        .movie-info {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.8rem;
        }

        .movie-meta {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .year-tag {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-weight: 500;
        }

        .btn-details {
            background-color: transparent;
            border: 1px solid #475569;
            color: var(--text-color);
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-details:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Lançamentos de <span>2026</span></h1>
        <p>Sua lista personalizada de filmes e eventos agendados para este ano.</p>
    </header>

    <div class="search-bar">
        <input type="text" id="searchInput" onkeyup="filterMovies()" placeholder="Buscar filme nesta lista...">
    </div>

    <div class="movie-grid" id="movieGrid">
        <!-- O HTML dos filmes será injetado pelo JavaScript para manter o código limpo -->
    </div>
</div>

<script>
    const movies = [
        "A Greve da Seleção da França", "A Noiva do Ano", "Agentes Muito Especiais", 
        "Apple Music Live: Lady Gaga MAYHEM Requiem", "Além do Dever", "Colisão: Acidente ou Homicídio?", 
        "Como Mágica", "Covil", "Criaturas Extraordinariamente Brilhantes", "Da Toscana, Com Amor", 
        "Devoradores de Estrelas", "El Salvador - O dia em que o medo mudou de lado", "Eles Vão te Matar", 
        "Enterrando os Mortos", "Eu & Você na Toscana", "Eu Só Posso Imaginar 2", "Gary", 
        "Ilusão Macabra", "Jack Ryan de Tom Clancy: Guerra Fantasma", "Maldição da Múmia", 
        "Martin Short: Uma Vida de Comédia", "Meu Nome é Agneta", "Meu Querido Assassino", 
        "Mexicali: Terra sem Lei", "Michael", "Minha Querida Menina", "Missão Refúgio", 
        "Mortal Kombat 2", "O Diabo Veste Prada 2", "O Drama", "O Genro", "O Jogo do Predador", 
        "O Justiceiro: Uma Última Morte", "O Som da Morte", "O fim da Cracolândia", 
        "Os Estranhos: Capítulo Final", "POV: Presença Oculta", "Pedagogia do Abandono", 
        "Perturbado Pelo Passado", "Pinóquio", "Primeiro as Damas", "Rastro do Ouro", 
        "Skyscraper Live", "Super Mario Galaxy: O Filme", "Todo Mundo no Rio com Shakira", 
        "UFC Fight Night 275: Della Maddalena vs. Prates", "UFC Fight Night 276: Allen vs. Costa", 
        "Untold Reino Unido: Jamie Vardy", "Untold Reino Unido: Vinnie Jones", 
        "Urso Sangrento: A Noite do Terror", "Vingadora", "Yiya Murano: Muerte a la hora del té"
    ];

    function renderMovies() {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        
        movies.forEach(title => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            
            // Aqui criamos um placeholder visual. Quando tiver os links das imagens, 
            // basta substituir a div '.poster-placeholder' por:
            // <img src="url-da-capa.jpg" class="movie-poster" alt="${title}">
            card.innerHTML = `
                <div class="poster-placeholder">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
                    </svg>
                    <span>Capa Indisponível</span>
                </div>
                <div class="movie-info">
                    <div class="movie-title" title="${title}">${title}</div>
                    <div class="movie-meta">
                        <span class="year-tag">2026</span>
                        <button class="btn-details">Info</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterMovies() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('movie-card');
        
        for (let i = 0; i < cards.length; i++) {
            const title = cards[i].querySelector('.movie-title').innerText.toLowerCase();
            if (title.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    // Inicializa a renderização dos filmes ao carregar a página
    renderMovies();
</script>

</body>
</html>
