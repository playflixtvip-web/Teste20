<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Status Cinema - Multi-Layout Ultra HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0a0d14;
            --bg-card: #111622;
            --accent-blue: #3b82f6;
            --accent-gold: #ffb800;
            --text-white: #ffffff;
            --text-muted: #94a3b8;
            --launch-purple: #8b5cf6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #05070a;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Painel de Controle Superior */
        .controls {
            background: var(--bg-card);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 460px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        textarea {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: var(--bg-main);
            color: var(--text-white);
            font-size: 15px;
            outline: none;
            resize: vertical;
            font-family: inherit;
        }

        select, input[type="text"], button {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: var(--bg-main);
            color: var(--text-white);
            font-size: 15px;
            outline: none;
        }

        .btn-gerar {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 5px;
        }

        .btn-tudo-em-um {
            background: linear-gradient(135deg, var(--launch-purple), #6d28d9);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        /* BLOCO MESTRE DA IMAGEM COMPLETA */
        .combo-launch-wrapper {
            width: 440px;
            background-color: var(--bg-main);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* Cabeçalho Unificado */
        .launch-header {
            background: linear-gradient(135deg, #161233, #0f172a);
            padding: 26px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .launch-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(to right, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .launch-header p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Linha Divisória sutil entre os cards */
        .launch-separator {
            height: 1px;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
            margin: 5px 0;
        }

        /* =======================================================
           ESTILO DO LAYOUT 1: COMPLETO (CAPA + PERFIL FLUTUANTE)
           ======================================================= */
        .premium-container {
            width: 440px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-main);
            padding-bottom: 15px;
        }

        .movie-cover-banner {
            width: 100%;
            height: 220px;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .cover-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, rgba(10, 13, 20, 0) 0%, var(--bg-main) 100%);
        }

        .profile-overlap-zone {
            padding: 0 24px;
            position: relative;
            height: 70px;
            display: flex;
            align-items: flex-end;
            z-index: 3;
        }

        .premium-avatar {
            width: 100px;
            height: 145px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
            border: 3px solid var(--bg-main);
            position: absolute;
            bottom: -15px;
            left: 24px;
            background-color: #1e293b;
        }

        .premium-rating {
            margin-left: 135px;
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .premium-content {
            padding: 20px 24px 5px 24px;
            display: flex;
            flex-direction: column;
        }

        .premium-title {
            font-size: 23px;
            font-weight: 800;
            color: var(--text-white);
            line-height: 1.25;
            margin-bottom: 8px;
        }


        /* =======================================================
           ESTILO DO LAYOUT 2: COMPACTO SLIM (PERFIL + LADO)
           ======================================================= */
        .slim-container {
            width: 440px;
            box-sizing: border-box;
            display: flex;
            padding: 18px 24px;
            gap: 18px;
            background-color: var(--bg-main);
            align-items: flex-start;
        }

        .slim-avatar {
            width: 105px;
            height: 155px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
            background-color: #1e293b;
            flex-shrink: 0;
        }

        .slim-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .slim-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 6px;
        }

        .slim-title {
            font-size: 19px;
            font-weight: 800;
            color: var(--text-white);
            line-height: 1.25;
        }

        .slim-rating {
            background: rgba(255, 184, 0, 0.1);
            border: 1px solid rgba(255, 184, 0, 0.2);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-gold);
            white-space: nowrap;
        }


        /* ELEMENTS COMPARTILHADOS (TAGS E SINOPSE) */
        .metadata-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .tag-item {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 10px;
            color: #cbd5e1;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag-item.blue {
            background-color: rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .synopsis-paragraph {
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.5;
            text-align: justify;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 4; 
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Rodapé Geral */
        .launch-footer {
            background-color: #0d111a;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 5px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>1. Escolha o Layout dos Cards:</label>
            <select id="layout-select">
                <option value="premium">✨ Completo Premium (Capa + Perfil Flutuante)</option>
                <option value="slim" selected>📱 Compacto Slim (Apenas Perfil + Lado)</option>
            </select>
        </div>

        <div class="control-group">
            <label>2. Título Principal do Banner:</label>
            <select id="header-select" onchange="toggleCustomHeaderInput()">
                <option value="lançamentos">🚀 Grandes Lançamentos</option>
                <option value="indicações">🍿 Indicações da Semana</option>
                <option value="personalizado">✏️ Título Personalizado...</option>
            </select>
            <input type="text" id="custom-header-title" placeholder="Escreva seu título aqui..." style="display: none; margin-top: 6px;">
        </div>

        <div class="control-group">
            <label>3. Digite os Filmes/Séries (um por linha):</label>
            <textarea id="search-input" rows="4" placeholder="Ex:&#10;Mortal Kombat 2&#10;O Diabo Veste Prada"></textarea>
        </div>
        
        <div class="control-group">
            <label>4. Tipo de Mídia Geral:</label>
            <select id="type-select">
                <option value="movie">🎬 Filtrar como Filme</option>
                <option value="tv">📺 Filtrar como Série</option>
            </select>
        </div>

        <button class="btn-gerar" onclick="gerarLoteNaTela()">Montar Lista na Tela</button>
        <button class="btn-tudo-em-um" onclick="exportarImagemUnica()">Gerar Imagem Única Completa</button>
    </div>

    <div class="combo-launch-wrapper" id="master-launch-block" style="display: none;">
        
        <div class="launch-header">
            <h1 id="header-title">Grandes Lançamentos</h1>
            <p id="header-subtitle">✦ Escolhas Especiais ✦</p>
        </div>

        <div id="inside-cards-holder"></div>

        <div class="launch-footer">
            🍿 Siga para mais dicas diárias 🍿
        </div>
    </div>

    <script>
        const API_KEY = '407d99491b2f26dc699e5171de3ea84e'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const PROXY_URL = 'https://images.weserv.nl/?url=';
        const TMDB_IMAGE_BASE = 'image.tmdb.org/t/p/w780';

        const GENRES = {
            28:"Ação", 12:"Aventura", 16:"Animação", 35:"Comédia", 80:"Crime", 99:"Documentário", 18:"Drama", 10751:"Família",
            14:"Fantasia", 36:"História", 27:"Terror", 10402:"Música", 9648:"Mistério", 10749:"Romance", 878:"Ficção Científica",
            10770:"Cinema TV", 53:"Thriller", 10752:"Guerra", 37:"Faroeste", 10759:"Action & Adventure", 10762:"Kids",
            10763:"News", 10764:"Reality", 10765:"Sci-Fi & Fantasy", 10766:"Soap", 10767:"Talk", 10768:"War & Politics"
        };

        function toggleCustomHeaderInput() {
            const select = document.getElementById('header-select').value;
            document.getElementById('custom-header-title').style.display = (select === 'personalizado') ? 'block' : 'none';
        }

        async function gerarLoteNaTela() {
            const textarea = document.getElementById('search-input');
            const type = document.getElementById('type-select').value;
            const layout = document.getElementById('layout-select').value;
            const headerStyle = document.getElementById('header-select').value;
            const holder = document.getElementById('inside-cards-holder');
            const masterBlock = document.getElementById('master-launch-block');
            
            // Tratamento do cabeçalho escolhido
            const titleEl = document.getElementById('header-title');
            const subtitleEl = document.getElementById('header-subtitle');
            
            if (headerStyle === 'lançamentos') {
                titleEl.innerText = "Grandes Lançamentos";
                subtitleEl.innerText = "✦ Escolhas Especiais ✦";
            } else if (headerStyle === 'indicações') {
                titleEl.innerText = "Indicações da Semana";
                subtitleEl.innerText = "✦ As Melhores Dicas ✦";
            } else {
                const customTxt = document.getElementById('custom-header-title').value.trim();
                titleEl.innerText = customTxt ? customTxt : "Destaques Culturais";
                subtitleEl.innerText = "✦ Seleção Exclusiva ✦";
            }

            holder.innerHTML = ''; 
            const linhas = textarea.value.split('\n').map(l => l.trim()).filter(l => l.length > 0).slice(0, 10);

            if (linhas.length === 0) return alert('Por favor, digite ao menos o nome de um filme.');

            masterBlock.style.display = "block"; 

            for (let i = 0; i < linhas.length; i++) {
                if (i > 0) {
                    holder.insertAdjacentHTML('beforeend', '<div class="launch-separator"></div>');
                }
                await buscarMidiaTMDB(linhas[i], type, layout, holder);
            }
        }

        async function buscarMidiaTMDB(query, type, layout, elementoAlvo) {
            try {
                const response = await fetch(`${BASE_URL}/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    const midia = data.results[0];

                    const titulo = midia.title || midia.name;
                    const dataLancamento = midia.release_date || midia.first_air_date;
                    const ano = dataLancamento ? dataLancamento.split('-')[0] : 'N/A';
                    const sinopse = midia.overview || 'A sinopse detalhada desta obra está sendo preparada pelos nossos editores.';
                    const nota = midia.vote_average ? midia.vote_average.toFixed(1) : '0.0';
                    
                    let generosTexto = 'Cinema';
                    if (midia.genre_ids && midia.genre_ids.length > 0) {
                        generosTexto = midia.genre_ids.slice(0, 2).map(id => GENRES[id] || 'Cinema').join(' / ');
                    }

                    const imgPoster = midia.poster_path ? `${TMDB_IMAGE_BASE}${midia.poster_path}` : '';
                    const imgBackdrop = midia.backdrop_path ? `${TMDB_IMAGE_BASE}${midia.backdrop_path}` : imgPoster;

                    const coverPath = imgBackdrop ? `${PROXY_URL}${imgBackdrop}` : 'https://via.placeholder.com/780x450?text=Cinema';
                    const profilePath = imgPoster ? `${PROXY_URL}${imgPoster}` : 'https://via.placeholder.com/300x450?text=Poster';

                    let htmlFinal = '';

                    if (layout === 'premium') {
                        // LAYOUT COMPLETO ANTERIOR (Capa Grande + Perfil Sobreposto)
                        htmlFinal = `
                            <div class="premium-container">
                                <div class="movie-cover-banner" style="background-image: url('${coverPath}')">
                                    <div class="cover-fade"></div>
                                </div>
                                <div class="profile-overlap-zone">
                                    <div class="premium-avatar" style="background-image: url('${profilePath}')"></div>
                                    <div class="premium-rating">⭐ ${nota}</div>
                                </div>
                                <div class="premium-content">
                                    <div class="premium-title">${titulo}</div>
                                    <div class="metadata-tags-row">
                                        <div class="tag-item blue">${type === 'movie' ? 'Filme' : 'Série'}</div>
                                        <div class="tag-item">${ano}</div>
                                        <div class="tag-item">${generosTexto}</div>
                                    </div>
                                    <p class="synopsis-paragraph">${sinopse}</p>
                                </div>
                            </div>
                        `;
                    } else {
                        // LAYOUT COMPACTO NOVO (Perfil na Esquerda + Nome e dados na Direita)
                        htmlFinal = `
                            <div class="slim-container">
                                <div class="slim-avatar" style="background-image: url('${profilePath}')"></div>
                                <div class="slim-content">
                                    <div class="slim-title-row">
                                        <div class="slim-title">${titulo}</div>
                                        <div class="slim-rating">⭐ ${nota}</div>
                                    </div>
                                    <div class="metadata-tags-row">
                                        <div class="tag-item blue">${type === 'movie' ? 'Filme' : 'Série'}</div>
                                        <div class="tag-item">${ano}</div>
                                        <div class="tag-item">${generosTexto}</div>
                                    </div>
                                    <p class="synopsis-paragraph">${sinopse}</p>
                                </div>
                            </div>
                        `;
                    }

                    elementoAlvo.insertAdjacentHTML('beforeend', htmlFinal);
                }
            } catch (error) {
                console.error("Erro ao puxar dados do TMDB:", error);
            }
        }

        function exportarImagemUnica() {
            const blocoMestre = document.getElementById('master-launch-block');

            if (blocoMestre.style.display === "none" || document.getElementById('inside-cards-holder').innerHTML === "") {
                return alert('Primeiro clique em "Montar Lista na Tela" para gerar o rascunho.');
            }

            const opcoes = {
                scale: 3, // Qualidade Ultra-HD cristalina para ler em qualquer smartphone
                dpi: 300,
                useCORS: true,           
                allowTaint: false,
                backgroundColor: "#0a0d14",
                logging: false
            };

            html2canvas(blocoMestre, opcoes).then((canvas) => {
                canvas.toBlob((blob) => {
                    if (!blob) return alert('Houve um erro técnico ao compilar o arquivo.');
                    const arquivo = new File([blob], 'vitrine-cinema.png', { type: 'image/png' });
                    
                    if (navigator.canShare && navigator.canShare({ files: [arquivo] })) {
                        navigator.share({
                            files: [arquivo],
                            title: 'Minhas Indicações',
                            text: 'Confira as sugestões de hoje! 🎬🍿'
                        }).catch(err => console.log("Compartilhamento interrompido"));
                    } else {
                        const link = document.createElement('a');
                        link.download = `vitrine-cinema-hd.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    }
                }, 'image/png');
            });
        }
    </script>
</body>
</html>
